<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>temp-attendance 測試頁</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
    }
    .card {
      width: min(92vw, 560px);
      background: rgba(15, 23, 42, 0.78);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
    }
    p {
      margin: 0 0 14px;
      line-height: 1.6;
      color: #cbd5e1;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
      background: #38bdf8;
      color: #082f49;
      font-weight: 700;
    }
    .ghost {
      background: transparent;
      color: #e2e8f0;
      border: 1px solid rgba(148, 163, 184, 0.35);
    }
    .panel {
      margin-top: 18px;
      padding: 16px;
      border-radius: 14px;
      background: rgba(30, 41, 59, 0.75);
    }
    .big {
      font-size: 1.6rem;
      font-weight: 800;
      margin-top: 6px;
    }
    .tiny {
      margin-top: 16px;
      font-size: 13px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>temp-attendance 測試頁</h1>
    <p>這是我直接幫你丟到 GitHub repo 的 HTML + JS 小頁面。沒有什麼偉大功能，但至少不是空殼。</p>

    <div class="panel">
      <div>現在時間</div>
      <div id="clock" class="big">--:--:--</div>
    </div>

    <div class="panel">
      <div>你今天點了幾下</div>
      <div id="count" class="big">0</div>
      <div class="row">
        <button id="addBtn">點我 +1</button>
        <button id="resetBtn" class="ghost">歸零</button>
      </div>
    </div>

    <div class="tiny">如果你看到這頁，代表這個 repo 至少真的活過來了，不再只是 temp 兩個字在那邊發呆。</div>
  </main>

  <script>
    const clockEl = document.getElementById('clock');
    const countEl = document.getElementById('count');
    const addBtn = document.getElementById('addBtn');
    const resetBtn = document.getElementById('resetBtn');
    const STORAGE_KEY = 'temp-attendance-click-count';

    function renderClock() {
      const now = new Date();
      clockEl.textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
    }

    function getCount() {
      return Number(localStorage.getItem(STORAGE_KEY) || 0);
    }

    function setCount(value) {
      localStorage.setItem(STORAGE_KEY, String(value));
      countEl.textContent = value;
    }

    addBtn.addEventListener('click', () => setCount(getCount() + 1));
    resetBtn.addEventListener('click', () => setCount(0));

    setCount(getCount());
    renderClock();
    setInterval(renderClock, 1000);
  </script>
</body>
</html>
